name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # L'export statique ne supporte ni les handlers POST ni les GET dynamiques.
      # Les routes API sont servies par le backend Render, pas par GitHub Pages :
      # on les retire de ce build (la source au repo n'est pas touchée).
      - name: Exclude backend-only API routes from static export
        run: rm -rf app/api

      - name: Build static export
        run: npm run build
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: /terra_website
          # URL du backend Render (variable de dépôt, pas un secret — inlinée dans le bundle client).
          NEXT_PUBLIC_API_BASE: ${{ vars.NEXT_PUBLIC_API_BASE }}

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          cname: ""
